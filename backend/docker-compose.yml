version: '3.8'

secrets:
  mongodb_root_password:
    file: ./secrets/mongodb_root_password.txt

services:
  # 后端 API 服务
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: github_pr_backend
    restart: unless-stopped
    ports:
      - "1234:1234"
    volumes:
      - ./config.json:/app/config.json:ro
      - ./encryption_key.json:/app/encryption_key.json:ro
      - backend_logs:/app/logs
      - backend_data:/app/data
    environment:
      - MONGODB_HOST=mongodb
      - MONGODB_PORT=27017
      - MONGODB_USERNAME=admin
      - MONGODB_DATABASE=github_pr_db
    secrets:
      - mongodb_root_password
    depends_on:
      - mongodb
    networks:
      - github_pr_network
    entrypoint:
      - /bin/bash
      - -c
      - |
        export MONGODB_PASSWORD=$$(cat /run/secrets/mongodb_root_password)
        exec python -m app.main

  # MongoDB 数据库 - 用于存储 JSON 数据
  mongodb:
    image: mongo:7.0
    container_name: github_pr_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    secrets:
      - mongodb_root_password
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_DATABASE: github_pr_db
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - github_pr_network
    entrypoint:
      - /bin/bash
      - -c
      - |
        export MONGO_INITDB_ROOT_PASSWORD=$$(cat /run/secrets/mongodb_root_password)
        exec docker-entrypoint.sh mongod

  # Mongo Express - MongoDB Web 管理界面
  mongo-express:
    image: mongo-express:1.0.0
    container_name: github_pr_mongo_express
    restart: unless-stopped
    ports:
      - "8081:8081"
    secrets:
      - mongodb_root_password
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD_FILE: /run/secrets/mongodb_root_password
      ME_CONFIG_BASICAUTH: false
    depends_on:
      - mongodb
    networks:
      - github_pr_network
    entrypoint:
      - /bin/bash
      - -c
      - |
        export ME_CONFIG_MONGODB_ADMINPASSWORD=$$(cat /run/secrets/mongodb_root_password)
        export ME_CONFIG_MONGODB_URL=mongodb://admin:$$ME_CONFIG_MONGODB_ADMINPASSWORD@mongodb:27017/
        exec /sbin/tini -- /docker-entrypoint.sh

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  backend_logs:
    driver: local
  backend_data:
    driver: local

networks:
  github_pr_network:
    driver: bridge
